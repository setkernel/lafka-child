name: Build Release Zip

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# POLICY: First-party GitHub-org actions only (actions/*, github/*).
# Release publishing uses the pre-installed `gh` CLI on the runner —
# no third-party release action.

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build zip
        run: |
          mkdir lafka-child
          rsync -a --exclude='.git' \
                   --exclude='.github' \
                   --exclude='.gitignore' \
                   --exclude='node_modules' \
                   --exclude='vendor' \
                   --exclude='package.json' \
                   --exclude='package-lock.json' \
                   --exclude='composer.json' \
                   --exclude='composer.lock' \
                   --exclude='.phpcs.xml.dist' \
                   --exclude='.stylelintrc.json' \
                   --exclude='eslint.config.mjs' \
                   --exclude='README.md' \
                   --exclude='LICENSE' \
                   ./ lafka-child/
          zip -r lafka-child.zip lafka-child/

      - name: Generate SHA256 checksum
        run: |
          sha256sum lafka-child.zip > lafka-child.zip.sha256
          cat lafka-child.zip.sha256

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — uploading assets with --clobber."
            gh release upload "$TAG" \
              lafka-child.zip \
              lafka-child.zip.sha256 \
              --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              lafka-child.zip \
              lafka-child.zip.sha256
          fi
